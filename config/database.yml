default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5

development:
  <<: *default
  database: everydayrails_development

test:
  <<: *default
  username: <%= ENV['DATABASE_USER'].presence || ENV['USER'] %>
  password: <%= ENV['DATABASE_PASSWORD'] %>
  host: <%= ENV['DATABASE_HOST'].presence || 'localhost' %>
  port: <%= ENV['DATABASE_PORT'].presence || 5432 %>
  min_messages: WARNING
  database: everydayrails_test

production:
  <<: *default
  database: everydayrails_production
  username: everydayrails
  password: <%= ENV['EVERYDAYRAILS_DATABASE_PASSWORD'] %>
