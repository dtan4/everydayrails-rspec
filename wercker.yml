box: ruby:2.3.1
services:
  - postgres
build:
  steps:
    - script:
        name: Install dependencies
        code: |
          apt-get update
          apt-get install -y nodejs
    - script:
        name: Install PhantomJS
        code: |
          wget -qO /tmp/phantomjs-2.1.1-linux-x86_64.tar.bz2 https://bitbucket.org/ariya/phantomjs/downloads/phantomjs-2.1.1-linux-x86_64.tar.bz2
          cd /tmp
          tar jxf phantomjs-2.1.1-linux-x86_64.tar.bz2
          mv phantomjs-2.1.1-linux-x86_64/bin/phantomjs /usr/local/bin/phantomjs
    - bundle-install
    - script:
        name: Set POSTGRES_USER
        code: export POSTGRES_USER=postgres
    - script:
        name: Prepare database
        code: bundle exec rake db:test:prepare
    - script:
        name: rspec
        code: bundle exec rspec
