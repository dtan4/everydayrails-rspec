box:
  id: quay.io/dtan4/rails-test-base
  tag: latest
  registry: quay.io
services:
  - postgres:9.4

build:
  steps:
    - script:
        name: Set POSTGRES_USER
        code: export POSTGRES_USER=postgres

test:
  steps:
    - bundle-install
    - script:
        name: Prepare database
        code: bundle exec rake db:test:prepare
    - script:
        name: Run RSpec
        code: bundle exec rspec
